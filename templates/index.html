<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickHouse SQL Query Tool</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container-fluid px-3">
        <!-- Sidebar -->
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h5 class="mb-0" style="text-align: right; flex: 1;"><i class="bi bi-database"></i> DB Explorer</h5>
                <button class="btn btn-sm btn-close-white" onclick="toggleSidebar()">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="sidebar-content">
                <div id="tree-loading" class="text-center p-3">
                    <div class="spinner-border spinner-border-sm text-light" role="status"></div>
                    <p class="mt-2 small">Loading tables...</p>
                </div>
                <div id="tree-container" style="display: none;">
                    <!-- Tree will be rendered here -->
                </div>
            </div>
        </div>
        
        <!-- Sidebar Toggle Button -->
        <button id="sidebar-toggle" class="btn btn-secondary" onclick="toggleSidebar()" style="position: fixed; left: 20px; top: 20px; z-index: 1050; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center;">
            <i class="bi bi-list"></i>
        </button>
        
        <div class="main-card" id="main-content" data-database="{{ database }}">
            <div class="header">
                <h1 class="mb-2">ClickHouse SQL Query Tool</h1>
                <p class="mb-0 opacity-90">Write, execute, and visualize your SQL queries</p>
            </div>
            
            <div class="p-4">
                <!-- Tab Navigation -->
                <ul class="nav nav-tabs" id="mainTabs">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" onclick="switchTab('editor'); return false;">
                            <i class="bi bi-code-slash"></i> SQL Editor
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="switchTab('saved'); return false;">
                            <i class="bi bi-bookmark"></i> Saved Queries
                        </a>
                    </li>
                </ul>
                
                <!-- Editor Tab -->
                <div id="editor-tab" class="tab-content active">
                <div class="mb-4">
                    <label class="form-label fw-bold">SQL Query</label>
                    <textarea id="sql-editor"></textarea>
                    
                    <div class="d-flex gap-2 mt-3 flex-wrap align-items-center">
                        <button class="btn btn-primary" id="run-btn" onclick="executeQuery()">
                            <i class="bi bi-play-fill"></i> Run Query
                        </button>
                        <button class="btn btn-outline-secondary" id="clear-btn" onclick="clearEditor()">
                            <i class="bi bi-x-lg"></i> Clear
                        </button>
                        <button class="btn btn-outline-success" id="save-query-btn" onclick="showSaveQueryModal()">
                            <i class="bi bi-bookmark-plus"></i> Save Query
                        </button>
                        <div id="execution-time" class="execution-time">
                            <i class="bi bi-clock"></i>
                            <span id="execution-time-text">0.00s</span>
                        </div>
                    </div>
                </div>
                
                <div id="alert" class="alert" role="alert" style="display: none;"></div>
                
                <div id="results-section" class="results-section">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <h2 class="h4 mb-0">📊 Results <span id="row-count" style="font-size: 0.9em; color: #6b7280;"></span></h2>
                        <div class="d-flex gap-2 align-items-center flex-wrap">
                            <button class="btn btn-outline-success btn-sm" onclick="downloadCSV()" id="download-csv-btn" style="display: none;">
                                <i class="bi bi-filetype-csv"></i> CSV
                            </button>
                            <button class="btn btn-outline-primary btn-sm" onclick="downloadExcel()" id="download-excel-btn" style="display: none;">
                                <i class="bi bi-file-earmark-excel"></i> Excel
                            </button>
                            <button class="btn btn-outline-info btn-sm" onclick="downloadParquet()" id="download-parquet-btn" style="display: none;">
                                <i class="bi bi-file-earmark-arrow-down"></i> Parquet
                            </button>
                        </div>
                    </div>
                    <div class="table-container">
                        <table class="table table-striped table-hover mb-0">
                            <thead id="table-head"></thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
                </div>
                
                <!-- Saved Queries Tab -->
                <div id="saved-tab" class="tab-content">
                    <div class="mt-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h2 class="h4 mb-0">📑 Saved Queries</h2>
                            <button class="btn btn-sm btn-outline-secondary" onclick="loadSavedQueries()">
                                <i class="bi bi-arrow-clockwise"></i> Refresh
                            </button>
                        </div>
                        <div id="saved-queries-list">
                            <!-- Queries will be loaded here -->
                        </div>
                        <nav id="pagination-container" class="mt-4" style="display: none;">
                            <ul class="pagination justify-content-center" id="pagination">
                                <!-- Pagination will be generated here -->
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <div class="footer">
        Developed with <i class="bi bi-heart-fill heart"></i> and a cup of coffee ☕ by <a href="https://github.com/ekotwidodo" target="_blank" rel="noopener noreferrer">ekotwidodo</a>
    </div>
    
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="text-center text-white">
            <div class="spinner mb-3"></div>
            <h5>Executing query...</h5>
            <p class="mt-2 mb-0" style="font-size: 1.2rem; font-weight: 600;">
                <i class="bi bi-clock"></i> <span id="loading-timer">0.00s</span>
            </p>
        </div>
    </div>
    
    <!-- Save Query Modal -->
    <div class="modal fade" id="saveQueryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-bookmark-plus"></i> Save Query</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="query-name-input" class="form-label">Query Name</label>
                        <input type="text" class="form-control" id="query-name-input" placeholder="e.g., Get All Students">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Preview</label>
                        <pre class="bg-light p-2 rounded" style="max-height: 150px; overflow-y: auto; font-size: 0.85rem;"><code id="query-preview"></code></pre>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveQuery()">Save Query</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- View Query Modal -->
    <div class="modal fade" id="viewQueryModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-eye"></i> View Query</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Query Name</label>
                        <p id="view-query-name"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">SQL Query</label>
                        <pre class="bg-dark text-light p-3 rounded" style="max-height: 400px; overflow-y: auto; font-size: 0.9rem;"><code id="view-query-sql"></code></pre>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Metadata</label>
                        <p class="mb-1"><i class="bi bi-calendar"></i> Created: <span id="view-query-created"></span></p>
                        <p class="mb-0"><i class="bi bi-clock"></i> Last Used: <span id="view-query-last-used"></span></p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/app.js"></script>
</body>
</html>
